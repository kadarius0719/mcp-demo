<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" role="img">
<title>In-app chat reaching across apps in the same account</title>
<desc>A chat inside App A reaches its home app plus an allowlisted set of other apps through the Gateway. The asking user's identity is carried via on-behalf-of token exchange, and each app enforces its own row-level authorization. Apps not in the chat's allowlist are unreachable.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
<path d="M1 1 L8 5 L1 9" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:Helvetica,Arial,sans-serif}
.h{font-size:21px;font-weight:700;fill:#111827}.sub{font-size:13px;fill:#6B7280}
.t{font-size:13.5px;font-weight:600}.s{font-size:11px}
.tag{font-size:10.5px;font-weight:700}
.blue rect{fill:#DBEAFE;stroke:#3B82F6}.blue .t{fill:#1E40AF}.blue .s{fill:#1D4ED8}
.indigo rect{fill:#E0E7FF;stroke:#6366F1}.indigo .t{fill:#3730A3}.indigo .s{fill:#4338CA}
.teal rect{fill:#CCFBF1;stroke:#14B8A6}.teal .t{fill:#115E59}.teal .s{fill:#0F766E}
.hide rect{fill:#F3F4F6;stroke:#9CA3AF;stroke-dasharray:5 3}.hide .t{fill:#9CA3AF}.hide .s{fill:#9CA3AF}
rect{stroke-width:1.5}
.ln{stroke:#9CA3AF;stroke-width:1.6;fill:none}
</style>
</defs>
<rect x="0.75" y="0.75" width="898.5" height="438.5" rx="14" fill="#ffffff" stroke="#E5E7EB"/>
<text class="h" x="40" y="44">In-app chat reaching across apps (same account)</text>
<text class="sub" x="40" y="65">Home app by default; other apps when the question needs them &#8212; each enforces its own access</text>

<!-- chat -->
<g class="blue"><rect x="40" y="120" width="180" height="72" rx="10"/><text class="t" x="130" y="150" text-anchor="middle">App A chat</text><text class="s" x="130" y="168" text-anchor="middle">user U asks here</text></g>
<!-- gateway/agent -->
<g class="indigo"><rect x="280" y="116" width="220" height="80" rx="10"/><text class="t" x="390" y="146" text-anchor="middle">Agent + AgentCore Gateway</text><text class="s" x="390" y="164" text-anchor="middle">Policy allowlist &#183; semantic select</text><text class="s" x="390" y="180" text-anchor="middle">OBO: carries user U's identity</text></g>
<line class="ln" x1="220" y1="156" x2="278" y2="156" marker-end="url(#ar)"/>

<!-- targets -->
<g class="teal"><rect x="560" y="92" width="300" height="50" rx="9"/><text class="t" x="576" y="113">App A data</text><text class="tag" x="844" y="113" text-anchor="end" fill="#0F766E">&#9733; HOME</text><text class="s" x="576" y="131">enforces U's row-level access</text></g>
<g class="teal"><rect x="560" y="150" width="300" height="50" rx="9"/><text class="t" x="576" y="171">App B data</text><text class="s" x="576" y="189">enforces U's row-level access</text></g>
<g class="teal"><rect x="560" y="208" width="300" height="50" rx="9"/><text class="t" x="576" y="229">App C data</text><text class="s" x="576" y="247">enforces U's row-level access</text></g>
<g class="hide"><rect x="560" y="266" width="300" height="50" rx="9"/><text class="t" x="576" y="287">App D data</text><text class="s" x="576" y="305">not in this chat's allowlist</text></g>

<line class="ln" x1="500" y1="150" x2="558" y2="117" marker-end="url(#ar)"/>
<line class="ln" x1="500" y1="156" x2="558" y2="175" marker-end="url(#ar)"/>
<line class="ln" x1="500" y1="162" x2="558" y2="233" marker-end="url(#ar)"/>
<line x1="500" y1="168" x2="556" y2="291" stroke="#D1D5DB" stroke-width="1.4" stroke-dasharray="5 3"/>
<text x="540" y="250" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#9CA3AF">&#10007;</text>

<!-- note band -->
<rect x="40" y="346" width="820" height="64" rx="10" fill="#EEF2FF" stroke="#6366F1"/>
<text x="58" y="369" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#3730A3"><tspan font-weight="700">Same account, all on ECS.</tspan> Each app is a Gateway target. The chat's allowlist (Policy) sets which apps it may reach.</text>
<text x="58" y="389" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#3730A3">Each app enforces row-level authz for the asking user &#8212; they see only what they're allowed to there.</text>
<text x="58" y="405" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#4338CA">Dependency: a shared identity provider (SSO) so user U's token is accepted and mapped in each app.</text>
</svg>

<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>One read-only interop layer, two ways to consume it</title>
<desc>Each app exposes its entities and lists once as read-only capabilities. The agent consumes them as MCP tools for natural-language help; other apps consume the same capabilities directly to populate form fields. An entity-resolution service matches the same entity across apps. Everything is read-only.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
<path d="M1 1 L8 5 L1 9" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M1 1 L8 5 L1 9" fill="none" stroke="#B45309" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:Helvetica,Arial,sans-serif}
.h{font-size:21px;font-weight:700;fill:#111827}.sub{font-size:13px;fill:#6B7280}
.t{font-size:13.5px;font-weight:600}.s{font-size:11px}
.blue rect{fill:#DBEAFE;stroke:#3B82F6}.blue .t{fill:#1E40AF}.blue .s{fill:#1D4ED8}
.indigo rect{fill:#E0E7FF;stroke:#6366F1}.indigo .t{fill:#3730A3}.indigo .s{fill:#4338CA}
.teal rect{fill:#CCFBF1;stroke:#14B8A6}.teal .t{fill:#115E59}.teal .s{fill:#0F766E}
.amber rect{fill:#FFFBEB;stroke:#F59E0B}.amber .t{fill:#92400E}.amber .s{fill:#B45309}
.gray rect{fill:#F3F4F6;stroke:#D1D5DB}.gray .t{fill:#374151}.gray .s{fill:#6B7280}
rect{stroke-width:1.5}
.ln{stroke:#9CA3AF;stroke-width:1.6;fill:none}
</style>
</defs>
<rect x="0.75" y="0.75" width="898.5" height="498.5" rx="14" fill="#ffffff" stroke="#E5E7EB"/>
<text class="h" x="40" y="44">One read-only interop layer, two ways to consume it</text>
<text class="sub" x="40" y="65">Expose each app's entities &amp; lists once; the agent and other apps both call them</text>
<rect x="724" y="28" width="116" height="22" rx="11" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/><text x="782" y="43" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">READ-ONLY</text>

<!-- consumers -->
<g class="indigo"><rect x="60" y="92" width="300" height="74" rx="10"/><text class="t" x="210" y="118" text-anchor="middle">Agent (natural language)</text><text class="s" x="210" y="136" text-anchor="middle">help &#183; Q&amp;A &#183; explain fields</text><text class="s" x="210" y="151" text-anchor="middle">anchored to the page's entity</text></g>
<g class="blue"><rect x="540" y="92" width="300" height="74" rx="10"/><text class="t" x="690" y="118" text-anchor="middle">App B form (direct call)</text><text class="s" x="690" y="136" text-anchor="middle">fill a field from App A's list</text><text class="s" x="690" y="151" text-anchor="middle">deterministic &#8212; no LLM</text></g>

<line class="ln" x1="210" y1="166" x2="330" y2="198" marker-end="url(#ar)"/>
<line class="ln" x1="690" y1="166" x2="570" y2="198" marker-end="url(#ar)"/>

<!-- access layer hub -->
<g class="indigo"><rect x="250" y="200" width="400" height="56" rx="10"/><text class="t" x="450" y="224" text-anchor="middle">Read-only access layer</text><text class="s" x="450" y="242" text-anchor="middle">Gateway (agent calls MCP tools) &#183; direct REST (apps)</text></g>

<!-- entity resolution -->
<g class="amber"><rect x="688" y="194" width="152" height="68" rx="10"/><text class="t" x="764" y="216" text-anchor="middle">Entity resolution</text><text class="s" x="764" y="233" text-anchor="middle">match same entity</text><text class="s" x="764" y="247" text-anchor="middle">across apps (ID map)</text></g>
<line x1="650" y1="228" x2="686" y2="228" stroke="#B45309" stroke-width="1.6" marker-start="url(#ar2)" marker-end="url(#ar2)"/>

<line class="ln" x1="360" y1="256" x2="200" y2="296" marker-end="url(#ar)"/>
<line class="ln" x1="450" y1="256" x2="450" y2="296" marker-end="url(#ar)"/>
<line class="ln" x1="540" y1="256" x2="700" y2="296" marker-end="url(#ar)"/>

<!-- capability layer -->
<g class="teal"><rect x="60" y="298" width="240" height="74" rx="10"/><text class="t" x="180" y="324" text-anchor="middle">App A</text><text class="s" x="180" y="342" text-anchor="middle">tools + resources</text><text class="s" x="180" y="357" text-anchor="middle">entities &#183; set lists</text></g>
<g class="teal"><rect x="330" y="298" width="240" height="74" rx="10"/><text class="t" x="450" y="324" text-anchor="middle">App B</text><text class="s" x="450" y="342" text-anchor="middle">tools + resources</text><text class="s" x="450" y="357" text-anchor="middle">entities &#183; set lists</text></g>
<g class="teal"><rect x="600" y="298" width="240" height="74" rx="10"/><text class="t" x="720" y="324" text-anchor="middle">App C</text><text class="s" x="720" y="342" text-anchor="middle">tools + resources</text><text class="s" x="720" y="357" text-anchor="middle">entities &#183; set lists</text></g>

<line class="ln" x1="180" y1="372" x2="180" y2="404" marker-end="url(#ar)"/>
<line class="ln" x1="450" y1="372" x2="450" y2="404" marker-end="url(#ar)"/>
<line class="ln" x1="720" y1="372" x2="720" y2="404" marker-end="url(#ar)"/>

<!-- data -->
<g class="gray"><rect x="60" y="406" width="780" height="52" rx="10"/><text class="t" x="450" y="429" text-anchor="middle">RDS read replicas &#183; curated views</text><text class="s" x="450" y="446" text-anchor="middle">read-only user (mcp_ro)</text></g>

<text class="sub" x="40" y="484">Same capability exposed once &#8212; the agent calls it as an MCP tool; apps call it directly. Identity bridged by the ID map.</text>
</svg>

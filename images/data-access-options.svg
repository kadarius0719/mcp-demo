<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>South-side data access — three strategies compared</title>
<desc>App API and search is the recommended default for find/list/show questions; guarded read-only SQL handles ad-hoc analytics with tight guardrails; vector RAG handles documents and long text.</desc>
<style>
text{font-family:Helvetica,Arial,sans-serif}
.h{font-size:21px;font-weight:700;fill:#111827}.sub{font-size:13px;fill:#6B7280}
.title{font-size:16px;font-weight:700}
.lab{font-size:10.5px;font-weight:700;letter-spacing:.05em}
.val{font-size:13px;fill:#374151}.note{font-size:12.5px;fill:#6B7280}
</style>
<rect x="0.75" y="0.75" width="898.5" height="518.5" rx="14" fill="#ffffff" stroke="#E5E7EB"/>
<text class="h" x="40" y="44">South-side data access &#8212; three strategies</text>
<text class="sub" x="40" y="65">Use all three, matched to the question type</text>

<!-- Card 1: App API / search (recommended) -->
<rect x="30" y="104" width="270" height="380" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
<text class="title" x="48" y="138" fill="#166534">App API / search</text>
<rect x="48" y="150" width="186" height="22" rx="11" fill="#22C55E"/><text x="141" y="165.5" text-anchor="middle" fill="#ffffff" font-family="Helvetica,Arial,sans-serif" font-size="10.5" font-weight="700">RECOMMENDED DEFAULT</text>
<text class="lab" x="48" y="200" fill="#15803D">BEST FOR</text><text class="val" x="48" y="219">find / list / show questions</text>
<text class="lab" x="48" y="256" fill="#15803D">HOW</text><text class="val" x="48" y="275">agent calls an existing endpoint</text>
<text class="lab" x="48" y="312" fill="#15803D">REUSES</text><text class="val" x="48" y="331">app authz, tenancy, tuned search</text>
<text class="lab" x="48" y="368" fill="#15803D">WATCH</text><text class="val" x="48" y="387">one small tool per app</text>

<!-- Card 2: Read-only SQL -->
<rect x="315" y="104" width="270" height="380" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
<text class="title" x="333" y="138" fill="#92400E">Guarded read-only SQL</text>
<text class="note" x="333" y="162" fill="#B45309">most power, most risk &#8212; fence it</text>
<text class="lab" x="333" y="200" fill="#B45309">BEST FOR</text><text class="val" x="333" y="219">counts, aggregates, trends</text>
<text class="lab" x="333" y="256" fill="#B45309">HOW</text><text class="val" x="333" y="275">NL to SQL over curated views</text>
<text class="lab" x="333" y="312" fill="#B45309">GUARDRAILS</text><text class="val" x="333" y="331">SELECT-only, tenant, row caps</text>
<text class="lab" x="333" y="368" fill="#B45309">WATCH</text><text class="val" x="333" y="387">read replica, never the writer</text>

<!-- Card 3: Vector / RAG -->
<rect x="600" y="104" width="270" height="380" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
<text class="title" x="618" y="138" fill="#1E40AF">Vector / RAG</text>
<text class="note" x="618" y="162" fill="#1D4ED8">when answers live in prose</text>
<text class="lab" x="618" y="200" fill="#1D4ED8">BEST FOR</text><text class="val" x="618" y="219">documents, long text fields</text>
<text class="lab" x="618" y="256" fill="#1D4ED8">HOW</text><text class="val" x="618" y="275">embed + semantic search</text>
<text class="lab" x="618" y="312" fill="#1D4ED8">REUSES</text><text class="val" x="618" y="331">existing OpenSearch index</text>
<text class="lab" x="618" y="368" fill="#1D4ED8">WATCH</text><text class="val" x="618" y="387">only where prose answers live</text>

<text class="note" x="450" y="510" text-anchor="middle">One agent can use all three &#8212; it picks the right tool per question.</text>
</svg>
